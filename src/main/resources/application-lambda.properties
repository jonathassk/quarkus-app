# Perfil ativo na Lambda (QUARKUS_PROFILE=lambda). Evita DDL e conexões extras no init/SnapStart.

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect
quarkus.hibernate-orm.log.sql=false

# Mongo não é usado no código; desabilita tentativa de conectar em localhost no cold start.
quarkus.mongodb.enabled=false
