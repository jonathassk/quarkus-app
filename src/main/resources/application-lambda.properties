# Perfil ativo na Lambda (QUARKUS_PROFILE=lambda). Evita DDL automático do Hibernate no init/SnapStart.

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect
quarkus.hibernate-orm.log.sql=false

# Aplica migrações versionadas no Neon ao subir (ex.: auth_user_id, role, daily_cost)
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# Mongo não é usado no código; desabilita tentativa de conectar em localhost no cold start.
quarkus.mongodb.enabled=false

# JWT — tolerância de relógio (Neon Auth + tokens legados)
smallrye.jwt.verify.clock-skew=90

# Neon Auth — todas as variáveis são OBRIGATÓRIAS em produção.
# Configure no painel de variáveis de ambiente da Lambda ou Secrets Manager:
#   NEON_AUTH_BASE_URL  = https://<endpoint>.neonauth.c-4.us-east-1.aws.neon.tech/neondb/auth
#   NEON_AUTH_JWKS_URL  = https://<endpoint>.neonauth.c-4.us-east-1.aws.neon.tech/neondb/auth/.well-known/jwks.json
#   NEON_AUTH_ISSUER    = https://<endpoint>.neonauth.c-4.us-east-1.aws.neon.tech/neondb/auth
#   NEON_AUTH_JWK_JSON  = {"keys":[{...}]}  (opcional — deixe vazio para buscar via JWKS_URL)
#   INTERNAL_SECRET     = <string aleatória forte, mínimo 32 caracteres>
neon.auth.base-url=${NEON_AUTH_BASE_URL:}

# R2 — defina R2_BUCKET_NAME, R2_ENDPOINT, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY na Lambda
r2.bucket=${R2_BUCKET_NAME:}
r2.endpoint=${R2_ENDPOINT:}
r2.access-key-id=${R2_ACCESS_KEY_ID:}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
