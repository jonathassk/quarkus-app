# Perfil de desenvolvimento local (QUARKUS_PROFILE=dev ou quarkus:dev).
# Este arquivo NUNCA deve ser usado em produção/staging.

# Hibernate — permite DDL automático em dev para facilitar iteração
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Logs mais verbosos em dev
quarkus.log.category."org.example".level=DEBUG
quarkus.log.category."org.hibernate.SQL".level=DEBUG
