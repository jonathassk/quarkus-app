# Change HTTP port to 8081
quarkus.http.port=8080

# AWS Lambda HTTP (API Gateway HTTP API)
# SAM templates gerados em target/sam.jvm.yaml e target/sam.native.yaml
# Build: mvn package | Deploy: sam deploy -t target/sam.jvm.yaml -g

# SnapStart: otimizações Quarkus para Lambda SnapStart (cold start reduzido)
quarkus.snapstart.enable=true

# Logging — obrigatório para logs aparecerem no CloudWatch
# Sem isso, apenas START/END/REPORT do Lambda aparecem; logs de aplicação são silenciados.
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%c{2.}] %s%e%n
quarkus.log.console.stderr=false
# Logs detalhados só para o pacote da aplicação (evita flood de libs)
quarkus.log.category."org.example".level=DEBUG
# Desabilita SQL em prod (muito verboso); habilite pontualmente via env var QUARKUS_LOG_CATEGORY_ORG_HIBERNATE_LEVEL=DEBUG
quarkus.log.category."org.hibernate.SQL".level=WARN

# Disable DevServices for PostgreSQL and MongoDB
quarkus.devservices.enabled=false

# Database configuration (Neon PostgreSQL)
# Senha: defina QUARKUS_DATASOURCE_PASSWORD no .env (local) ou variável de ambiente na Lambda.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=neondb_owner
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}
# Sobrescreva com QUARKUS_DATASOURCE_JDBC_URL na Lambda se precisar.
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://ep-steep-night-ai1jrfuk-pooler.c-4.us-east-1.aws.neon.tech:5432/neondb?sslmode=require&channel_binding=require&connectTimeout=10000&socketTimeout=30000}
# Pool JDBC ajustado para Lambda + SnapStart (evita reaproveitar conexoes quebradas)
quarkus.datasource.jdbc.initial-size=0
quarkus.datasource.jdbc.min-size=0
quarkus.datasource.jdbc.max-size=5
quarkus.datasource.jdbc.idle-removal-interval=30S
quarkus.datasource.jdbc.max-lifetime=5M
quarkus.datasource.jdbc.background-validation-interval=30S
quarkus.datasource.jdbc.foreground-validation-interval=5S
quarkus.datasource.jdbc.acquisition-timeout=10S

# Hibernate ORM configuration
# SEGURANÇA: 'none' é o padrão seguro para produção.
# Para desenvolvimento local, defina QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION=update no .env
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=no-file

# Flyway migrations
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# MongoDB configuration
quarkus.mongodb.connection-string=mongodb://localhost:27017
quarkus.mongodb.database=quarkus-app

# REST JSON configuration
quarkus.resteasy.gzip.enabled=true

# CORS — inclua todos os domínios do frontend (local + produção).
# Sobrescreva na Lambda: QUARKUS_HTTP_CORS_ORIGINS=https://baggagi.com,https://www.baggagi.com,http://localhost:3000
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${QUARKUS_HTTP_CORS_ORIGINS:http://localhost:3000,https://baggagi.com,https://www.baggagi.com,https://baqqaqi.com,https://www.baqqaqi.com}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type,Origin,X-Requested-With,X-Internal-Secret,X-Baggagi-Authorization
quarkus.http.cors.exposed-headers=Authorization,Content-Type
quarkus.http.cors.access-control-max-age=24H

# Neon Auth — validação EdDSA (obrigatório para Google OAuth / tokens do front)
#
# INSTÂNCIAS:
#   PROD  → ep-steep-night-ai1jrfuk  (configure via env vars)
#   DEV   → ep-frosty-sky-aiim45vq   (configure via env vars na Lambda DEV)
#
# NEON_AUTH_BASE_URL  : issuer completo do JWT (inclui /neondb/auth) — OBRIGATÓRIO
# NEON_AUTH_JWKS_URL  : endpoint JWKS para buscar a chave pública dinamicamente — OBRIGATÓRIO
# NEON_AUTH_JWK_JSON  : chave pública EdDSA em cache (opcional — deixe vazio para usar JWKS_URL)
# NEON_AUTH_ISSUER    : issuer para validação do JWT legado (mp.jwt)
#
# SEGURANÇA: Não existe default hardcoded para NEON_AUTH_BASE_URL nem para NEON_AUTH_JWK_JSON.
# A aplicação desabilitará a validação Neon Auth se essas variáveis não forem definidas.
neon.auth.base-url=${NEON_AUTH_BASE_URL:}
neon.auth.jwks-url=${NEON_AUTH_JWKS_URL:}
# NEON_AUTH_JWK_JSON deve ser definido como variável de ambiente — nunca hardcode aqui.
neon.auth.jwk-json=${NEON_AUTH_JWK_JSON:}

# JWT legado (login e-mail/senha local RS256) — não usar para tokens Neon Auth (EdDSA)
mp.jwt.verify.publickey.algorithm=RS256
mp.jwt.verify.publickey.location=${NEON_AUTH_JWKS_URL:https://ep-steep-night-ai1jrfuk.neonauth.c-4.us-east-1.aws.neon.tech/neondb/auth/.well-known/jwks.json}
mp.jwt.verify.issuer=${NEON_AUTH_ISSUER:https://ep-steep-night-ai1jrfuk.neonauth.c-4.us-east-1.aws.neon.tech/neondb/auth}
smallrye.jwt.verify.clock-skew=90

# Chave privada para geração de tokens legados (mantida para não quebrar build)
mp.jwt.sign.key.location=privateKey.pem
mp.jwt.sign.algorithm=RS256
# Segredo interno para rotas protegidas
# SEGURANÇA: INTERNAL_SECRET não tem fallback. Se não for definida, o valor ficará vazio
# e qualquer rota que use esse segredo deve rejeitar requests sem ele.
# Defina INTERNAL_SECRET com um valor forte (>= 32 chars) nas variáveis de ambiente.
internal.secret=${INTERNAL_SECRET:}

# Cloudflare R2 (S3-compatible) — documentos de viagem
r2.bucket=${R2_BUCKET_NAME:}
r2.endpoint=${R2_ENDPOINT:}
r2.access-key-id=${R2_ACCESS_KEY_ID:}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
documents.presign.upload.minutes=15
documents.presign.view.minutes=30
# Trip document multipart upload (browser → API → R2, avoids R2 CORS on PUT)
quarkus.http.limits.max-body-size=12M
documents.upload.max-bytes=10485760

# =============================================================================
# AWS DynamoDB — tabela posts_network
# ARN: arn:aws:dynamodb:sa-east-1:252186483726:table/posts_network
# =============================================================================
# Em produção (Lambda), usa a IAM Role da função — não defina AWS_ACCESS_KEY_ID.
# Em dev local, defina AWS_ACCESS_KEY_ID e AWS_SECRET_ACCESS_KEY no .env.
aws.dynamodb.region=${AWS_DYNAMODB_REGION:sa-east-1}
aws.dynamodb.posts-table=${AWS_DYNAMODB_POSTS_TABLE:posts_network}
# SEGURANÇA: sem defaults de credencial — use IAM role em prod ou .env em dev local.
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}

# Stripe Configurations
# SEGURANÇA: Sem defaults de API key ou webhook secret — devem ser obrigatoriamente configurados
# via variáveis de ambiente. Nunca commite chaves reais aqui.
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:3000/payment/success}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:3000/payment/cancel}

# Stripe Price IDs
stripe.price.mensal=${STRIPE_PRICE_MENSAL:}
stripe.price.anual=${STRIPE_PRICE_ANUAL:}
stripe.price.mensal-agent=${STRIPE_PRICE_MENSAL_AGENT:}
stripe.price.anual-agent=${STRIPE_PRICE_ANUAL_AGENT:}

# =============================================================================
# OpenAPI / Swagger UI
# =============================================================================
# Spec disponível em: GET /q/openapi
# Swagger UI em:      GET /q/swagger-ui
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# Metadados da API
quarkus.smallrye-openapi.info-title=Baggagi API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API REST do backend Baggagi — planejamento de viagens com suporte a B2C (assinaturas), B2B (agências) e guests via Magic Link.
quarkus.smallrye-openapi.info-contact-name=Time Baggagi
quarkus.smallrye-openapi.info-contact-url=https://baggagi.com

# Schema de segurança Bearer JWT (para o botão "Authorize" do Swagger UI)
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=BearerAuth
quarkus.smallrye-openapi.jwt-security-scheme-value=bearer
quarkus.smallrye-openapi.security-scheme-description=JWT de sessão — obtenha via /api/v1/auth/session-sync (usuários B2C) ou /api/v1/auth/magic-link/verify (guests).

# Servidores
quarkus.smallrye-openapi.servers=http://localhost:8080,https://api.baggagi.com

# Test profile overrides
%test.quarkus.devservices.enabled=true
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.mongodb.devservices.enabled=true
%test.quarkus.datasource.username=quarkus
%test.quarkus.datasource.password=quarkus
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.migrate-at-start=true
%test.stripe.api.key=sk_test_mock
%test.stripe.webhook.secret=whsec_mock
%test.stripe.price.mensal=price_mock
%test.stripe.price.anual=price_mock
%test.stripe.price.mensal-agent=price_mock
%test.stripe.price.anual-agent=price_mock
%test.internal.secret=mock_internal_secret_value_32_chars

# Dev profile overrides (prevents startup crash if local .env is unconfigured)
%dev.stripe.api.key=sk_test_mock
%dev.stripe.webhook.secret=whsec_mock
%dev.stripe.price.mensal=price_mock
%dev.stripe.price.anual=price_mock
%dev.stripe.price.mensal-agent=price_mock
%dev.stripe.price.anual-agent=price_mock
%dev.internal.secret=mock_internal_secret_value_32_chars